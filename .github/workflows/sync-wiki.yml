name: Sync wiki

on:
  push:
    branches: [main]
    paths:
      - "docs/wiki/**"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone wiki repo
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/rpapub/ConFigTree.wiki.git" wiki

      - name: Mirror docs/wiki/ → wiki/
        run: |
          rsync -a --delete --exclude='.git/' docs/wiki/ wiki/

      - name: Commit and push
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to sync." || \
            git commit -m "docs: sync wiki from main@${{ github.sha }}" && git push

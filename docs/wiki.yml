# Wiki content plan for ConFigTree
# This file is the source of truth for wiki structure, page metadata, and content status.
# It does NOT get synced to the GitHub wiki — it lives in docs/wiki.yml.
#
# status values: stub | draft | review | complete

sidebar:
  - Home
  - Getting-Started
  - Excel-Format
  - Configuration
  - XAML-Snippet
  - Changelog
  - FAQ-Developers
  - FAQ-Media

pages:

  - file: Home.md
    title: ConFigTree
    nav_label: Home
    status: draft
    issues:
      - 64   # docs: wiki scaffolding
    description: >
      Landing page. One-paragraph pitch, quick-links to all other pages,
      link to the live tool.
    outline:
      - What ConFigTree does (one sentence)
      - Quick links table
      - Live tool link

  - file: Getting-Started.md
    title: Getting Started
    nav_label: Getting Started
    status: draft
    issues:
      - 41   # docs: document the ConFigTree DX integration steps for UiPath Studio
      - 43   # doc: track manual Studio integration steps (DX runbook)
    description: >
      End-to-end walkthrough: open the tool, load a file, configure settings,
      generate, copy or download.
    outline:
      - Open the tool
      - Load a file (drag-and-drop vs browse)
      - Configure settings (brief, link to Configuration page)
      - Regenerate
      - Copy / Download
      - Next step: paste XAML into Studio (link to XAML-Snippet)

  - file: Excel-Format.md
    title: Excel Format
    nav_label: Excel Format
    status: draft
    issues:
      - 48   # feat: exclude dot-prefixed sheet names from code generation
      - 58   # feat: optional DataType column in config sheets
      - 59   # fix: detect ValueType column by header name, not position
      - 60   # test: robustness when ValueType column present at generation but absent at runtime
    description: >
      Reference for the .xlsx input format — sheet naming rules,
      config sheet columns, asset sheet columns, ValueType column.
    outline:
      - Sheet naming conventions (dot-prefix exclusion)
      - Config sheet column reference (Name, Value, Type, Description)
      - Asset sheet column reference (Name, Asset, Folder, Description, ValueType)
      - ValueType mapping table (string/int/bool/object)
      - Example workbook layout

  - file: Configuration.md
    title: Configuration
    nav_label: Configuration
    status: draft
    issues:
      - 35   # feat: configurable UiPath variable name setting
      - 38   # feat: configurable readonly properties
      - 39   # feat: add 'Clear local storage' button
      - 42   # feat: differentiate generated code by Target .NET version
      - 57   # feat: embed generator version in generated .cs header
    description: >
      Settings sidebar reference — every setting and feature toggle,
      with default values and effect on generated output.
    outline:
      - Settings group (Namespace, Root class, Filename, Target .NET)
      - Features group (XML docs, Loader, ToString, ToJson, IsPristine, Readonly)
      - UiPath group (Variable name)
      - localStorage persistence note
      - Reset settings

  - file: XAML-Snippet.md
    title: XAML Snippet
    nav_label: XAML Snippet
    status: draft
    issues:
      - 41   # docs: document the ConFigTree DX integration steps for UiPath Studio
      - 44   # bug: XAML clipboard paste fails (fixed)
      - 52   # feat: implement REFramework asset loading via GetRobotAsset
      - 54   # feat: typed asset values — OrchestratorAsset.Value concrete type
    description: >
      How to use the generated XAML clipboard snippet in UiPath Studio —
      what it contains, how to paste it, Studio prerequisites.
    outline:
      - What the snippet contains (ForEach + Assign for xlsx; single Assign for others)
      - Asset loading loop (GetRobotAsset per asset property)
      - How to paste into Studio (Ctrl+V in InitAllSettings.xaml)
      - Variable name setting
      - Studio / REFramework prerequisites

  - file: Changelog.md
    title: Changelog
    nav_label: Changelog
    status: draft
    issues:
      - 40   # feat: embed build number / commit SHA in deployed output
      - 57   # feat: embed generator version in generated .cs header
    description: >
      Release notes and version history, newest first.
      Mirrors the highlights from git history.
    outline:
      - Unreleased section
      - One dated section per release sprint
      - Link to full commit history

  - file: FAQ-Developers.md
    title: "FAQ — Developers"
    nav_label: "FAQ — Developers"
    status: stub
    issues:
      - 55   # backlog: proper JS test framework
      - 56   # refactor: extract parsers into js/parsers.js
      - 64   # docs: wiki scaffolding
    description: >
      Frequently asked questions for developers contributing to or building on ConFigTree.
    outline:
      - General (what is it, where does it run)
      - Running locally
      - Code structure overview (parsers.js, cs-generator.js, xaml-generator.js, app.js)
      - SchemaNode IR explained
      - How to add a new input format
      - How to add a new C# feature toggle
      - Test suite status and how to run tests
      - Architecture decisions (no build step, Web Awesome, XAML template approach)
      - Deployment (GitHub Pages, build.json, wiki sync)

  - file: FAQ-Media.md
    title: "FAQ — Media & Content Creators"
    nav_label: "FAQ — Media & Content Creators"
    status: stub
    issues:
      - 64   # docs: wiki scaffolding
    description: >
      Frequently asked questions for bloggers, YouTubers, and RPA community
      content creators covering ConFigTree.
    outline:
      - What is ConFigTree in one sentence
      - What problem does it solve (the Dict pain point in REFramework)
      - Who is the target audience (UiPath RPA developers)
      - What input formats are supported
      - Is it free / open source (MIT, GitHub)
      - Does it require installation (no — browser-only)
      - Key tagline and messaging ("Drop the Dict! Your Config deserves better.")
      - Screenshot and asset availability
      - How to link / cite the project
      - Contact / maintainer info

special:

  - file: _Sidebar.md
    description: Navigation sidebar rendered on every wiki page. Generated from sidebar list above.

  - file: _Footer.md
    description: Footer rendered on every wiki page. Contains links to the live tool, GitHub, issues.

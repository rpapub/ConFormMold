<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConFormMold</title>

  <!-- Web Awesome -->
  <script src="https://kit.webawesome.com/9d55e66325f84b80.js" crossorigin="anonymous"></script>

  <!-- SheetJS — pinned -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <!-- highlight.js — pinned, Solarized Light theme -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/solarized-light.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/csharp.min.js"></script>

  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div id="app">

    <header>
      <h1>ConFormMold</h1>
      <span style="color: var(--sol-base2); font-size: 0.8rem;">Excel → C# config class generator</span>
    </header>

    <details id="settings-bar">
      <summary>Settings</summary>
      <div id="settings-fields">
        <label class="settings-field">
          <span class="settings-label">Namespace</span>
          <wa-input id="cfg-namespace" size="small" clearable></wa-input>
        </label>
        <label class="settings-field">
          <span class="settings-label">Root class</span>
          <wa-input id="cfg-root-class" size="small" clearable></wa-input>
        </label>
        <label class="settings-field">
          <span class="settings-label">Target .NET</span>
          <wa-select id="cfg-dotnet-version" size="small" style="min-width:8rem;">
            <wa-option value="net6">.NET 6</wa-option>
            <wa-option value="net7">.NET 7</wa-option>
            <wa-option value="net8">.NET 8</wa-option>
            <wa-option value="net9">.NET 9</wa-option>
          </wa-select>
        </label>
        <label class="settings-field">
          <span class="settings-label">XML docs</span>
          <wa-switch id="cfg-xml-docs"></wa-switch>
        </label>
        <wa-button id="regenerate-btn" variant="neutral" size="small" disabled>
          <wa-icon slot="prefix" name="refresh"></wa-icon>
          Regenerate
        </wa-button>
      </div>
    </details>

    <wa-split-panel id="split" position="40">
      <div slot="start" class="panel">
        <h2>Input</h2>

        <label id="drop-zone">
          <input type="file" id="file-input" accept=".xlsx" />
          <wa-icon name="file-spreadsheet" style="font-size: 2rem; color: var(--sol-base01);"></wa-icon>
          <p style="margin: 0.5rem 0 0;">Drop <code>.xlsx</code> here or click to browse</p>
        </label>

        <div id="status">
          <wa-spinner id="spinner" style="display:none;"></wa-spinner>
          <span id="status-text"></span>
        </div>
      </div>

      <div slot="end" class="panel">
        <div style="display:flex; align-items:center; justify-content:space-between;">
          <h2>Output</h2>
          <wa-button id="copy-btn" variant="neutral" size="small">
            <wa-icon slot="prefix" name="copy"></wa-icon>
            Copy
          </wa-button>
        </div>
        <pre><code id="output" class="language-csharp"></code></pre>
      </div>
    </wa-split-panel>

  </div>

  <script src="js/app.js" defer></script>
</body>
</html>

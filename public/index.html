<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConFigTree — Drop the Dict! Your Config deserves better.</title>

  <!-- Web Awesome -->
  <script src="https://kit.webawesome.com/9d55e66325f84b80.js" crossorigin="anonymous"></script>

  <!-- smol-toml — ESM, sets window.TOML = { parse } -->
  <script type="module">
    import { parse } from "https://esm.sh/smol-toml@1.3.4";
    window.TOML = { parse };
  </script>

  <!-- js-yaml — pinned UMD, exposes window.jsyaml -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

  <!-- SheetJS — pinned -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <!-- highlight.js — pinned, Solarized Light theme -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/solarized-light.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/csharp.min.js"></script>

  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <wa-page mobile-breakpoint="600">

    <!-- ── Header ─────────────────────────────────────────────── -->
    <header slot="header" class="app-header">
      <span class="app-brand">ConFigTree</span>
      <span class="app-subtitle">Drop the Dict! Your Config deserves better.</span>
      <nav class="header-nav">
        <a href="https://github.com/rpapub/ConFigTree/wiki" class="header-link" title="Documentation">
          <wa-icon name="book" variant="regular"></wa-icon>
          Docs
        </a>
        <a href="https://github.com/rpapub/ConFigTree/issues" class="header-link" title="Open an issue">
          <wa-icon name="circle-question" variant="regular"></wa-icon>
          Support
        </a>
        <a href="https://github.com/rpapub/ConFigTree" class="header-link" title="GitHub repository">
          <wa-icon name="github" family="brands"></wa-icon>
          GitHub
        </a>
      </nav>
    </header>

    <!-- ── Settings sidebar ───────────────────────────────────── -->
    <nav slot="navigation" class="settings-nav">

      <wa-button id="regenerate-btn" variant="brand" size="medium" disabled class="regenerate-btn">
        <wa-icon slot="start" name="rotate" variant="regular"></wa-icon>
        Regenerate
      </wa-button>

      <section class="settings-group">
        <h3 class="settings-group-label">Settings</h3>
        <label class="settings-field input-field">
          <span class="settings-label">Namespace</span>
          <wa-input id="cfg-namespace" size="small" clearable></wa-input>
        </label>
        <label class="settings-field input-field">
          <span class="settings-label">Root class</span>
          <wa-input id="cfg-root-class" size="small" clearable></wa-input>
        </label>
        <label class="settings-field input-field">
          <span class="settings-label">Filename</span>
          <wa-input id="cfg-filename" size="small" clearable></wa-input>
        </label>
        <label class="settings-field input-field">
          <span class="settings-label">Target .NET</span>
          <wa-select id="cfg-dotnet-version" size="small">
            <wa-option value="net6">.NET 6</wa-option>
            <wa-option value="net8">.NET 8</wa-option>
          </wa-select>
        </label>
      </section>

      <section class="settings-group">
        <h3 class="settings-group-label">Features</h3>
        <label class="settings-field switch-field">
          <span class="settings-label">XML docs</span>
          <wa-switch id="cfg-xml-docs"></wa-switch>
        </label>
        <label class="settings-field switch-field">
          <span class="settings-label">Loader</span>
          <wa-switch id="cfg-loader"></wa-switch>
        </label>
        <label class="settings-field switch-field">
          <span class="settings-label">ToString</span>
          <wa-switch id="cfg-tostring"></wa-switch>
        </label>
        <label class="settings-field switch-field">
          <span class="settings-label">ToJson</span>
          <wa-switch id="cfg-tojson"></wa-switch>
        </label>
        <label class="settings-field switch-field">
          <span class="settings-label">IsPristine</span>
          <wa-switch id="cfg-pristine"></wa-switch>
        </label>
        <label class="settings-field switch-field">
          <span class="settings-label">Readonly</span>
          <wa-switch id="cfg-readonly"></wa-switch>
        </label>
      </section>

      <section class="settings-group">
        <h3 class="settings-group-label">UiPath</h3>
        <label class="settings-field input-field">
          <span class="settings-label">Variable name</span>
          <wa-input id="cfg-uipath-var" size="small" clearable></wa-input>
        </label>
      </section>

    </nav>

    <!-- ── Main content ───────────────────────────────────────── -->
    <div class="app-main">

      <!-- Compact input toolbar -->
      <div id="input-toolbar">
        <wa-file-input id="file-input" accept=".xlsx,.json,.toml,.yaml,.yml">
          <div slot="dropzone" class="file-dropzone-content">
            <wa-icon name="folder-open" variant="regular"></wa-icon>
            <span>Browse or drop file</span>
          </div>
        </wa-file-input>

        <div id="sheet-selection" style="display:none;">
          <div id="sheet-checkboxes"></div>
        </div>

        <div id="warnings"></div>
        <span id="status-text" class="status-text"></span>
      </div>

      <!-- Output area -->
      <div id="output-area">

        <div class="output-header">
          <div class="tab-list" role="tablist">
            <button class="tab-btn active" data-tab="cs" role="tab" aria-selected="true">C# class</button>
            <button class="tab-btn" data-tab="xaml" role="tab" aria-selected="false" disabled>XAML snippet</button>
          </div>
          <div class="output-actions">
            <wa-button id="download-btn" variant="neutral" size="small" disabled>
              <wa-icon slot="start" name="download" variant="regular"></wa-icon>
              Download
            </wa-button>
            <wa-button id="copy-btn" variant="neutral" size="small" disabled>
              <wa-icon slot="start" name="copy" variant="regular"></wa-icon>
              Copy
            </wa-button>
          </div>
        </div>

        <div class="tab-panel" id="tab-cs">
          <pre class="output-pre"><code id="output" class="language-csharp"></code></pre>
        </div>
        <div class="tab-panel" id="tab-xaml" style="display:none;">
          <pre class="output-pre"><code id="output-xaml" class="language-xml"></code></pre>
        </div>

      </div>

    </div>

    <!-- ── Footer ─────────────────────────────────────────────── -->
    <footer slot="footer" class="app-footer">
      <a href="#" id="reset-settings-btn">Reset settings</a>
      <span id="build-info"></span>
    </footer>

  </wa-page>

  <script src="js/parsers.js" defer></script>
  <script src="js/cs-generator.js" defer></script>
  <script src="js/xaml-generator.js" defer></script>
  <script src="js/app.js" defer></script>
  <script>
    fetch("build.json").then(r => r.json()).then(b => {
      const el = document.getElementById("build-info");
      if (el) el.textContent = `${b.sha.slice(0,7)} · ${b.ts.slice(0,10)}`;
    }).catch(() => {});
    document.getElementById("reset-settings-btn").addEventListener("click", e => {
      e.preventDefault();
      localStorage.clear();
      location.reload();
    });
  </script>
</body>
</html>
